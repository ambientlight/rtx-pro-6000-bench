served_model_name: devstral-2-123b-instruct-2512
tensor_parallel_size: 4
tool_call_parser: mistral

enable_auto_tool_choice: true
trust_remote_code: true

gpu_memory_utilization: 0.90
disable_custom_all_reduce: true

max_num_seqs: 128
max_model_len: 262144
max_num_batched_tokens: 65536

enable_chunked_prefill: true
#max_num_partial_prefills: 4
#max_long_partial_prefills: 2

# FP8 KV cache: works on Blackwell sm_120 with FlashInfer backend
# DO NOT enable calculate_kv_scales (computes wrong scales from random warmup tokens)
# Default scale=1.0 works correctly for this model
kv_cache_dtype: fp8_e4m3

# Blackwell sm_120 compilation config:
# - mode=3 (VLLM_COMPILE): torch.compile + Inductor optimization
# - custom_ops=all: keep all vLLM CUDA kernels (prevents Triton decomposition crashes on sm_120)
# - cudagraph_mode=full_and_piecewise: CUDAGraphs for decode, piecewise for prefill
# - fuse_act_quant=false: disabled because silu_and_mul_nvfp4_quant fused kernel crashes in compiled graphs on sm_120 (NCCL error at layer ~69)
compilation_config:
  mode: 3
  custom_ops:
    - "all"
  cudagraph_mode: full_and_piecewise
  pass_config:
    fuse_norm_quant: true
    fuse_act_quant: false

# generation-config: vllm
# override-generation-config: '{"temperature": 0.0, "max_new_tokens": 4096}'
